<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日閱讀_家校共讀家長入班打卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script>
        // Tailwind 配置
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        dark: '#1F2937',
                        light: '#F9FAFB'
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .hover-scale {
                transition: transform 0.3s ease;
            }
            .hover-scale:hover {
                transform: scale(1.03);
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in;
            }
            .slide-up {
                animation: slideUp 0.4s ease-out;
            }
            .pulse {
                animation: pulse 2s infinite;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-dark">
    <!-- 頂部導航 -->
    <header class="bg-white shadow-md fixed w-full top-0 z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-book text-primary text-2xl"></i>
                <h1 class="text-xl md:text-2xl font-bold text-primary">明日閱讀</h1>
                <span class="hidden md:inline-block text-sm text-gray-500 ml-2">家校共讀家長入班打卡系統</span>
            </div>
            <div class="flex items-center space-x-4">
                <button id="statsBtn" class="hidden md:flex items-center text-sm text-gray-600 hover:text-primary transition-colors">
                    <i class="fa fa-bar-chart mr-1"></i> 統計
                </button>
                <button id="manageBtn" class="hidden md:flex items-center text-sm text-gray-600 hover:text-primary transition-colors">
                    <i class="fa fa-cog mr-1"></i> 管理
                </button>
                <button id="loginBtn" class="bg-primary hover:bg-primary/90 text-white px-3 py-1.5 rounded-md text-sm transition-colors">
                    <i class="fa fa-user mr-1"></i> 管理員登入
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容 -->
    <main class="container mx-auto px-4 pt-24 pb-16 min-h-screen">
        <!-- 打卡表單 -->
        <section id="checkinSection" class="max-w-2xl mx-auto mb-12 fade-in">
            <div class="bg-white rounded-xl shadow-lg p-6 md:p-8 hover-scale">
                <h2 class="text-2xl font-bold text-center mb-6 text-dark">家長入班打卡</h2>
                
                <form id="checkinForm" class="space-y-5">
                    <div>
                        <label for="grade" class="block text-sm font-medium text-gray-700 mb-1">年級</label>
                        <div class="relative">
                            <select id="grade" name="grade" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none">
                                <option value="">請選擇年級</option>
                                <option value="1">一年級</option>
                                <option value="2">二年級</option>
                                <option value="3">三年級</option>
                                <option value="4">四年級</option>
                                <option value="5">五年級</option>
                                <option value="6">六年級</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                                <i class="fa fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label for="class" class="block text-sm font-medium text-gray-700 mb-1">班級</label>
                        <div class="relative">
                            <select id="class" name="class" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none">
                                <option value="">請先選擇年級</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                                <i class="fa fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label for="parentName" class="block text-sm font-medium text-gray-700 mb-1">家長姓名</label>
                        <input type="text" id="parentName" name="parentName" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                            placeholder="請輸入您的姓名">
                    </div>
                    
                    <div>
                        <label for="checkinDate" class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                        <input type="date" id="checkinDate" name="checkinDate" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                    </div>
                    
                    <button type="submit" 
                        class="w-full bg-secondary hover:bg-secondary/90 text-white font-medium py-3 px-4 rounded-lg transition-all flex items-center justify-center">
                        <i class="fa fa-check-circle mr-2"></i> 完成打卡
                    </button>
                </form>
            </div>
        </section>

        <!-- 統計資訊 -->
        <section id="statsSection" class="max-w-4xl mx-auto mb-12 hidden fade-in">
            <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-dark">打卡統計資訊</h2>
                    <button id="backFromStatsBtn" class="text-primary hover:text-primary/80 transition-colors">
                        <i class="fa fa-arrow-left mr-1"></i> 返回
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-blue-50 p-5 rounded-lg border border-blue-100">
                        <h3 class="text-lg font-semibold text-blue-700 mb-3">今日打卡人數</h3>
                        <div class="text-4xl font-bold text-blue-600" id="todayCount">0</div>
                        <p class="text-sm text-blue-500 mt-2" id="todayDate"></p>
                    </div>
                    
                    <div class="bg-green-50 p-5 rounded-lg border border-green-100">
                        <h3 class="text-lg font-semibold text-green-700 mb-3">本週打卡人數</h3>
                        <div class="text-4xl font-bold text-green-600" id="weekCount">0</div>
                        <p class="text-sm text-green-500 mt-2" id="weekRange"></p>
                    </div>
                </div>
                
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">本週各班打卡統計</h3>
                    <div class="h-80">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 管理介面 -->
        <section id="manageSection" class="max-w-5xl mx-auto mb-12 hidden fade-in">
            <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-dark">管理介面</h2>
                    <button id="backFromManageBtn" class="text-primary hover:text-primary/80 transition-colors">
                        <i class="fa fa-arrow-left mr-1"></i> 返回
                    </button>
                </div>
                
                <!-- 管理選項 -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                    <button id="modifyPasswordBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-primary hover:bg-primary/5 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mr-3">
                                <i class="fa fa-lock"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">修改密碼</h3>
                                <p class="text-sm text-gray-500">變更管理員密碼</p>
                            </div>
                        </div>
                    </button>
                    
                    <button id="exportDataBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-primary hover:bg-primary/5 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mr-3">
                                <i class="fa fa-download"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">匯出資料</h3>
                                <p class="text-sm text-gray-500">下載打卡記錄</p>
                            </div>
                        </div>
                    </button>
                    
                    <button id="importDataBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-primary hover:bg-primary/5 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mr-3">
                                <i class="fa fa-upload"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">匯入資料</h3>
                                <p class="text-sm text-gray-500">上傳打卡記錄</p>
                            </div>
                        </div>
                    </button>
                    
                    <button id="editRecordsBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-primary hover:bg-primary/5 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mr-3">
                                <i class="fa fa-edit"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">增修資料</h3>
                                <p class="text-sm text-gray-500">修改打卡記錄</p>
                            </div>
                        </div>
                    </button>
                    
                    <button id="deleteRecordsBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-red-500 hover:bg-red-50 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-500 mr-3">
                                <i class="fa fa-trash"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">刪除資料</h3>
                                <p class="text-sm text-gray-500">移除打卡記錄</p>
                            </div>
                        </div>
                    </button>
                    
                    <button id="resetDataBtn" class="bg-white border border-gray-200 rounded-lg p-4 text-left hover:border-red-500 hover:bg-red-50 transition-all hover-scale">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-500 mr-3">
                                <i class="fa fa-refresh"></i>
                            </div>
                            <div>
                                <h3 class="font-medium">重置數據</h3>
                                <p class="text-sm text-gray-500">清空所有記錄</p>
                            </div>
                        </div>
                    </button>
                </div>
                
                <!-- 打卡記錄表格 -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">打卡記錄列表</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">年級</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">班級</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">家長姓名</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">打卡日期</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody" class="bg-white divide-y divide-gray-200">
                                <!-- 記錄將由JavaScript動態生成 -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-4 text-center text-gray-500 text-sm" id="noRecordsMsg">
                        沒有打卡記錄
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="bg-dark text-white py-6">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <div class="flex items-center justify-center md:justify-start">
                        <i class="fa fa-book text-primary mr-2"></i>
                        <span class="font-bold">明日閱讀_家校共讀家長入班打卡系統</span>
                    </div>
                    <p class="text-gray-400 text-sm mt-1 text-center md:text-left">鼓勵親子共讀，促進家校合作</p>
                </div>
                <div class="text-gray-400 text-sm">
                    &copy; 2023 明日閱讀計畫 版權所有
                </div>
            </div>
        </div>
    </footer>

    <!-- 打卡成功彈窗 -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4 slide-up text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa fa-check text-2xl text-green-500"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">已打卡成功！</h3>
            <p class="text-gray-600 mb-6" id="successMessage"></p>
            <button id="closeSuccessModal" class="bg-primary hover:bg-primary/90 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                確認
            </button>
        </div>
    </div>

    <!-- 管理員登入彈窗 -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">管理員登入</h3>
                <button id="closeLoginModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">使用者名稱</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                <button type="submit" 
                    class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    登入
                </button>
            </form>
        </div>
    </div>

    <!-- 修改密碼彈窗 -->
    <div id="passwordModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">修改密碼</h3>
                <button id="closePasswordModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="passwordForm" class="space-y-4">
                <div>
                    <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-1">目前密碼</label>
                    <input type="password" id="currentPassword" name="currentPassword" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">新密碼</label>
                    <input type="password" id="newPassword" name="newPassword" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">確認新密碼</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                <button type="submit" 
                    class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    儲存修改
                </button>
            </form>
        </div>
    </div>

    <!-- 刪除確認彈窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="text-center mb-4">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-exclamation-triangle text-2xl text-red-500"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800">確認刪除</h3>
                <p class="text-gray-600 mt-2">您確定要刪除這條記錄嗎？此操作無法撤銷。</p>
            </div>
            <div class="flex space-x-3 mt-6">
                <button id="cancelDeleteBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors">
                    取消
                </button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    確認刪除
                </button>
            </div>
        </div>
    </div>

    <!-- 重置數據確認彈窗 -->
    <div id="resetModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="text-center mb-4">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-warning text-2xl text-red-500"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800">警告！重置數據</h3>
                <p class="text-gray-600 mt-2">您確定要清空所有打卡記錄嗎？此操作將刪除所有數據且無法恢復！</p>
            </div>
            <div class="flex space-x-3 mt-6">
                <button id="cancelResetBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors">
                    取消
                </button>
                <button id="confirmResetBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    確認重置
                </button>
            </div>
        </div>
    </div>

    <!-- 編輯記錄彈窗 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">編輯打卡記錄</h3>
                <button id="closeEditModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editRecordId">
                <div>
                    <label for="editGrade" class="block text-sm font-medium text-gray-700 mb-1">年級</label>
                    <div class="relative">
                        <select id="editGrade" name="editGrade" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none">
                            <option value="1">一年級</option>
                            <option value="2">二年級</option>
                            <option value="3">三年級</option>
                            <option value="4">四年級</option>
                            <option value="5">五年級</option>
                            <option value="6">六年級</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                            <i class="fa fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label for="editClass" class="block text-sm font-medium text-gray-700 mb-1">班級</label>
                    <div class="relative">
                        <select id="editClass" name="editClass" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none">
                            <!-- 班級選項將由JavaScript動態生成 -->
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                            <i class="fa fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label for="editParentName" class="block text-sm font-medium text-gray-700 mb-1">家長姓名</label>
                    <input type="text" id="editParentName" name="editParentName" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                
                <div>
                    <label for="editCheckinDate" class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                    <input type="date" id="editCheckinDate" name="editCheckinDate" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                </div>
                
                <button type="submit" 
                    class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    儲存修改
                </button>
            </form>
        </div>
    </div>

    <!-- 匯入資料彈窗 -->
    <div id="importModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden fade-in">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">匯入打卡資料</h3>
                <button id="closeImportModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <p class="text-gray-600 mb-4">請上傳CSV格式的打卡資料文件</p>
            <form id="importForm" class="space-y-4" enctype="multipart/form-data">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-primary transition-colors">
                    <i class="fa fa-file-text-o text-3xl text-gray-400 mb-2"></i>
                    <p class="text-gray-500 mb-2">拖放CSV文件到這裡，或</p>
                    <label class="cursor-pointer bg-primary/10 text-primary hover:bg-primary/20 font-medium py-2 px-4 rounded-lg transition-colors inline-block">
                        選擇文件
                        <input type="file" id="importFile" name="importFile" accept=".csv" class="hidden">
                    </label>
                </div>
                <button type="submit" 
                    class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    匯入資料
                </button>
            </form>
        </div>
    </div>

    <script>
        // 全局變量初始化
        let checkinRecords = JSON.parse(localStorage.getItem('checkinRecords')) || [];
        let currentUser = localStorage.getItem('currentUser') || null;
        let selectedRecordId = null;
        let weeklyChart = null;

        // DOM元素獲取
        const gradeSelect = document.getElementById('grade');
        const classSelect = document.getElementById('class');
        const checkinForm = document.getElementById('checkinForm');
        const successModal = document.getElementById('successModal');
        const successMessage = document.getElementById('successMessage');
        const closeSuccessModal = document.getElementById('closeSuccessModal');
        const checkinDate = document.getElementById('checkinDate');
        const statsBtn = document.getElementById('statsBtn');
        const manageBtn = document.getElementById('manageBtn');
        const checkinSection = document.getElementById('checkinSection');
        const statsSection = document.getElementById('statsSection');
        const manageSection = document.getElementById('manageSection');
        const backFromStatsBtn = document.getElementById('backFromStatsBtn');
        const backFromManageBtn = document.getElementById('backFromManageBtn');
        const loginBtn = document.getElementById('loginBtn');
        const loginModal = document.getElementById('loginModal');
        const closeLoginModal = document.getElementById('closeLoginModal');
        const loginForm = document.getElementById('loginForm');
        const recordsTableBody = document.getElementById('recordsTableBody');
        const noRecordsMsg = document.getElementById('noRecordsMsg');
        const todayCount = document.getElementById('todayCount');
        const todayDate = document.getElementById('todayDate');
        const weekCount = document.getElementById('weekCount');
        const weekRange = document.getElementById('weekRange');
        const modifyPasswordBtn = document.getElementById('modifyPasswordBtn');
        const passwordModal = document.getElementById('passwordModal');
        const closePasswordModal = document.getElementById('closePasswordModal');
        const passwordForm = document.getElementById('passwordForm');
        const deleteRecordsBtn = document.getElementById('deleteRecordsBtn');
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const resetDataBtn = document.getElementById('resetDataBtn');
        const resetModal = document.getElementById('resetModal');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');
        const editRecordsBtn = document.getElementById('editRecordsBtn');
        const editModal = document.getElementById('editModal');
        const closeEditModal = document.getElementById('closeEditModal');
        const editForm = document.getElementById('editForm');
        const editGrade = document.getElementById('editGrade');
        const editClass = document.getElementById('editClass');
        const exportDataBtn = document.getElementById('exportDataBtn');
        const importDataBtn = document.getElementById('importDataBtn');
        const importModal = document.getElementById('importModal');
        const closeImportModal = document.getElementById('closeImportModal');
        const importForm = document.getElementById('importForm');
        const importFile = document.getElementById('importFile');

        // 初始化函數
        function init() {
            // 設置今天的日期為預設值
            const today = new Date().toISOString().split('T')[0];
            checkinDate.value = today;
            
            // 填充班級選項的事件監聽
            gradeSelect.addEventListener('change', () => populateClassOptions(classSelect));
            editGrade.addEventListener('change', () => populateClassOptions(editClass));
            
            // 打卡表單提交
            checkinForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleCheckin();
            });
            
            // 關閉成功彈窗
            closeSuccessModal.addEventListener('click', () => {
                successModal.classList.add('hidden');
            });
            
            // 切換到統計頁面
            statsBtn.addEventListener('click', () => {
                checkinSection.classList.add('hidden');
                manageSection.classList.add('hidden');
                statsSection.classList.remove('hidden');
                updateStats();
            });
            
            // 切換到管理頁面
            manageBtn.addEventListener('click', () => {
                if (currentUser) {
                    checkinSection.classList.add('hidden');
                    statsSection.classList.add('hidden');
                    manageSection.classList.remove('hidden');
                    renderRecordsTable();
                } else {
                    loginModal.classList.remove('hidden');
                }
            });
            
            // 從統計頁面返回
            backFromStatsBtn.addEventListener('click', () => {
                statsSection.classList.add('hidden');
                checkinSection.classList.remove('hidden');
            });
            
            // 從管理頁面返回
            backFromManageBtn.addEventListener('click', () => {
                manageSection.classList.add('hidden');
                checkinSection.classList.remove('hidden');
            });
            
            // 打開登入彈窗
            loginBtn.addEventListener('click', () => {
                if (currentUser) {
                    handleLogout();
                } else {
                    loginModal.classList.remove('hidden');
                }
            });
            
            // 關閉登入彈窗
            closeLoginModal.addEventListener('click', () => {
                loginModal.classList.add('hidden');
            });
            
            // 管理員登入
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleLogin();
            });
            
            // 修改密碼按鈕
            modifyPasswordBtn.addEventListener('click', () => {
                passwordModal.classList.remove('hidden');
            });
            
            // 關閉修改密碼彈窗
            closePasswordModal.addEventListener('click', () => {
                passwordModal.classList.add('hidden');
            });
            
            // 提交密碼修改
            passwordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handlePasswordChange();
            });
            
            // 刪除記錄按鈕
            deleteRecordsBtn.addEventListener('click', () => {
                // 如果沒有選擇記錄，顯示提示
                if (!selectedRecordId) {
                    alert('請先選擇要刪除的記錄');
                    return;
                }
                deleteModal.classList.remove('hidden');
            });
            
            // 取消刪除
            cancelDeleteBtn.addEventListener('click', () => {
                deleteModal.classList.add('hidden');
            });
            
            // 確認刪除
            confirmDeleteBtn.addEventListener('click', handleDeleteRecord);
            
            // 重置數據按鈕
            resetDataBtn.addEventListener('click', () => {
                resetModal.classList.remove('hidden');
            });
            
            // 取消重置
            cancelResetBtn.addEventListener('click', () => {
                resetModal.classList.add('hidden');
            });
            
            // 確認重置
            confirmResetBtn.addEventListener('click', handleResetData);
            
            // 關閉編輯彈窗
            closeEditModal.addEventListener('click', () => {
                editModal.classList.add('hidden');
            });
            
            // 提交編輯表單
            editForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleEditRecord();
            });
            
            // 匯出資料
            exportDataBtn.addEventListener('click', exportData);
            
            // 打開匯入資料彈窗
            importDataBtn.addEventListener('click', () => {
                importModal.classList.remove('hidden');
            });
            
            // 關閉匯入資料彈窗
            closeImportModal.addEventListener('click', () => {
                importModal.classList.add('hidden');
            });
            
            // 匯入資料表單提交
            importForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleImportData();
            });
            
            // 初始化班級選項
            populateClassOptions(classSelect);
            populateClassOptions(editClass);
            
            // 檢查是否已登入
            updateUIForLoginStatus();
            
            // 初始化圖表
            initChart();
        }

        // 填充班級選項
        function populateClassOptions(targetSelect) {
            const grade = targetSelect === classSelect ? gradeSelect.value : editGrade.value;
            targetSelect.innerHTML = '';
            
            if (!grade) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '請先選擇年級';
                targetSelect.appendChild(option);
                return;
            }
            
            for (let i = 1; i <= 8; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `${i}班`;
                targetSelect.appendChild(option);
            }
        }

        // 處理打卡
        function handleCheckin() {
            const grade = gradeSelect.value;
            const classNum = classSelect.value;
            const parentName = document.getElementById('parentName').value;
            const date = checkinDate.value;
            
            // 創建新記錄
            const newRecord = {
                id: Date.now().toString(),
                grade: grade,
                class: classNum,
                parentName: parentName,
                date: date,
                timestamp: new Date().toISOString()
            };
            
            // 添加到記錄數組
            checkinRecords.push(newRecord);
            
            // 保存到localStorage
            saveRecords();
            
            // 顯示成功消息
            successMessage.textContent = `${parentName}家長，您已成功為${grade}年級${classNum}班打卡！`;
            successModal.classList.remove('hidden');
            
            // 重置表單
            checkinForm.reset();
            checkinDate.value = new Date().toISOString().split('T')[0];
            
            // 更新統計
            updateStats();
        }

        // 處理管理員登入
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 默認管理員帳號密碼: admin / admin123
            const adminUser = localStorage.getItem('adminUser') || 'admin';
            const adminPassword = localStorage.getItem('adminPassword') || 'admin123';
            
            if (username === adminUser && password === adminPassword) {
                currentUser = username;
                localStorage.setItem('currentUser', currentUser);
                loginModal.classList.add('hidden');
                loginForm.reset();
                alert('登入成功');
                updateUIForLoginStatus();
                
                // 切換到管理頁面
                checkinSection.classList.add('hidden');
                statsSection.classList.add('hidden');
                manageSection.classList.remove('hidden');
                renderRecordsTable();
            } else {
                alert('使用者名稱或密碼錯誤');
            }
        }

        // 處理密碼修改
        function handlePasswordChange() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 驗證
            const adminPassword = localStorage.getItem('adminPassword') || 'admin123';
            
            if (currentPassword !== adminPassword) {
                alert('目前密碼不正確');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('新密碼與確認密碼不一致');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('密碼長度至少為6個字符');
                return;
            }
            
            // 保存新密碼
            localStorage.setItem('adminPassword', newPassword);
            passwordModal.classList.add('hidden');
            passwordForm.reset();
            alert('密碼修改成功');
        }

        // 處理記錄刪除
        function handleDeleteRecord() {
            checkinRecords = checkinRecords.filter(record => record.id !== selectedRecordId);
            saveRecords();
            deleteModal.classList.add('hidden');
            renderRecordsTable();
            updateStats();
            selectedRecordId = null;
        }

        // 處理數據重置
        function handleResetData() {
            if (confirm('確定要清空所有數據嗎？此操作無法撤銷！')) {
                checkinRecords = [];
                saveRecords();
                resetModal.classList.add('hidden');
                renderRecordsTable();
                updateStats();
                alert('所有數據已重置');
            }
        }

        // 編輯記錄
        function editRecord(id) {
            const record = checkinRecords.find(r => r.id === id);
            if (record) {
                selectedRecordId = id;
                document.getElementById('editRecordId').value = id;
                editGrade.value = record.grade;
                populateClassOptions(editClass);
                editClass.value = record.class;
                document.getElementById('editParentName').value = record.parentName;
                document.getElementById('editCheckinDate').value = record.date;
                editModal.classList.remove('hidden');
            }
        }

        // 處理記錄編輯
        function handleEditRecord() {
            const id = document.getElementById('editRecordId').value;
            const grade = editGrade.value;
            const classNum = editClass.value;
            const parentName = document.getElementById('editParentName').value;
            const date = document.getElementById('editCheckinDate').value;
            
            const index = checkinRecords.findIndex(r => r.id === id);
            if (index !== -1) {
                checkinRecords[index] = {
                    ...checkinRecords[index],
                    grade: grade,
                    class: classNum,
                    parentName: parentName,
                    date: date
                };
                
                saveRecords();
                editModal.classList.add('hidden');
                renderRecordsTable();
                updateStats();
                alert('記錄已更新');
            }
        }

        // 匯出資料
        function exportData() {
            if (checkinRecords.length === 0) {
                alert('沒有數據可匯出');
                return;
            }
            
            // 轉換為CSV格式
            let csvContent = "年級,班級,家長姓名,打卡日期,打卡時間\n";
            
            checkinRecords.forEach(record => {
                csvContent += `${record.grade},${record.class},${record.parentName},${record.date},${record.timestamp}\n`;
            });
            
            // 創建Blob對象
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            
            // 創建下載鏈接
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `打卡記錄_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 處理資料匯入
        function handleImportData() {
            const file = importFile.files[0];
            if (!file) {
                alert('請選擇要匯入的CSV文件');
                return;
            }
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const content = e.target.result;
                const lines = content.split('\n');
                
                // 跳過標題行
                let importedCount = 0;
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;
                    
                    const parts = lines[i].split(',');
                    if (parts.length >= 4) {
                        const newRecord = {
                            id: Date.now().toString() + i,
                            grade: parts[0].trim(),
                            class: parts[1].trim(),
                            parentName: parts[2].trim(),
                            date: parts[3].trim(),
                            timestamp: parts[4] ? parts[4].trim() : new Date().toISOString()
                        };
                        
                        checkinRecords.push(newRecord);
                        importedCount++;
                    }
                }
                
                saveRecords();
                importModal.classList.add('hidden');
                importForm.reset();
                renderRecordsTable();
                updateStats();
                alert(`成功匯入 ${importedCount} 條記錄`);
            };
            
            reader.readAsText(file);
        }

        // 保存記錄到localStorage
        function saveRecords() {
            localStorage.setItem('checkinRecords', JSON.stringify(checkinRecords));
        }

        // 渲染記錄表格
        function renderRecordsTable() {
            recordsTableBody.innerHTML = '';
            
            if (checkinRecords.length === 0) {
                noRecordsMsg.classList.remove('hidden');
                return;
            }
            
            noRecordsMsg.classList.add('hidden');
            
            // 按時間排序，最新的在前
            const sortedRecords = [...checkinRecords].sort((a, b) => 
                new Date(b.timestamp) - new Date(a.timestamp)
            );
            
            sortedRecords.forEach(record => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                
                // 點擊行時選擇該記錄
                row.addEventListener('click', () => {
                    // 移除其他行的選中狀態
                    document.querySelectorAll('#recordsTableBody tr').forEach(r => {
                        r.classList.remove('bg-blue-50');
                    });
                    
                    // 添加當前行的選中狀態
                    row.classList.add('bg-blue-50');
                    selectedRecordId = record.id;
                });
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${record.grade}年級</td>
                    <td class="px-6 py-4 whitespace-nowrap">${record.class}班</td>
                    <td class="px-6 py-4 whitespace-nowrap">${record.parentName}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${record.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="event.stopPropagation(); editRecord('${record.id}')" class="text-primary hover:text-primary/80 mr-3">
                            <i class="fa fa-pencil"></i>
                        </button>
                        <button onclick="event.stopPropagation(); selectedRecordId = '${record.id}'; deleteModal.classList.remove('hidden')" class="text-red-500 hover:text-red-700">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                
                recordsTableBody.appendChild(row);
            });
        }

        // 更新統計資訊
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayRecords = checkinRecords.filter(record => record.date === today);
            todayCount.textContent = todayRecords.length;
            todayDate.textContent = formatDate(today);
            
            // 計算本週的記錄
            const now = new Date();
            const firstDayOfWeek = new Date(now);
            firstDayOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)); // 設定為星期一
            firstDayOfWeek.setHours(0, 0, 0, 0);
            
            const lastDayOfWeek = new Date(firstDayOfWeek);
            lastDayOfWeek.setDate(firstDayOfWeek.getDate() + 6);
            lastDayOfWeek.setHours(23, 59, 59, 999);
            
            const weekRecords = checkinRecords.filter(record => {
                const recordDate = new Date(record.date);
                return recordDate >= firstDayOfWeek && recordDate <= lastDayOfWeek;
            });
            
            weekCount.textContent = weekRecords.length;
            weekRange.textContent = `${formatDate(firstDayOfWeek.toISOString().split('T')[0])} - ${formatDate(lastDayOfWeek.toISOString().split('T')[0])}`;
            
            // 更新圖表
            updateChart(weekRecords);
        }

        // 初始化圖表
        function initChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            
            // 初始化空圖表
            weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '打卡人數',
                        data: [],
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
            
            // 更新圖表數據
            updateStats();
        }

        // 更新圖表數據
        function updateChart(weekRecords) {
            // 按班級分組統計
            const classCounts = {};
            
            // 初始化所有班級
            for (let grade = 1; grade <= 6; grade++) {
                for (let classNum = 1; classNum <= 8; classNum++) {
                    const key = `${grade}年級${classNum}班`;
                    classCounts[key] = 0;
                }
            }
            
            // 統計每個班級的打卡人數
            weekRecords.forEach(record => {
                const key = `${record.grade}年級${record.class}班`;
                classCounts[key]++;
            });
            
            // 過濾掉沒有打卡記錄的班級
            const filteredData = Object.entries(classCounts).filter(([_, count]) => count > 0);
            
            // 更新圖表
            weeklyChart.data.labels = filteredData.map(([className, _]) => className);
            weeklyChart.data.datasets[0].data = filteredData.map(([_, count]) => count);
            weeklyChart.update();
        }

        // 更新登入狀態的UI
        function updateUIForLoginStatus() {
            if (currentUser) {
                loginBtn.innerHTML = `<i class="fa fa-sign-out mr-1"></i> 登出`;
            } else {
                loginBtn.innerHTML = `<i class="fa fa-user mr-1"></i> 管理員登入`;
            }
        }

        // 處理登出
        function handleLogout() {
            if (confirm('確定要登出嗎？')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateUIForLoginStatus();
                manageSection.classList.add('hidden');
                checkinSection.classList.remove('hidden');
            }
        }

        // 格式化日期顯示
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 暴露editRecord函數到全局
        window.editRecord = editRecord;

        // 頁面加載完成後初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
